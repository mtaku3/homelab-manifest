apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcli
  namespace: cloudcli
  labels:
    app: cloudcli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudcli
  template:
    metadata:
      labels:
        app: cloudcli
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: cloudcli
          image: ghcr.io/mtaku3/cloudcli:latest
          ports:
            - containerPort: 3001
          volumeMounts:
            - name: data
              mountPath: /home/cloudcli
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cloudcli-data
