coder:
  env:
    - name: CODER_PG_CONNECTION_URL
      valueFrom:
        secretKeyRef:
          name: coder-db-url
          key: url
    - name: CODER_ACCESS_URL
      value: "https://coder.mtaku3.com"
    - name: CODER_WILDCARD_ACCESS_URL
      value: "*.coder.mtaku3.com"
  service:
    type: ClusterIP
  ingress:
    enabled: false
