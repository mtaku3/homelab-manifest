apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-sha-plugin-secret-reader
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-sha-plugin-secret-reader
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: github-sha-plugin
    namespace: argocd
roleRef:
  kind: Role
  name: github-sha-plugin-secret-reader
  apiGroup: rbac.authorization.k8s.io
