helmCharts:
  - repo: https://argoproj.github.io/argo-helm
    name: argo-cd
    version: "9.2.2"
    includeCRDs: true
    namespace: argocd
    releaseName: argocd
    valuesFile: values.yaml

resources:
  - application.yaml
  - app-cert-manager.yaml
  - app-external-dns.yaml
  - app-gitlab.yaml
  - app-loxilb.yaml
  - app-open-webui.yaml
  - app-piraeus-datastore.yaml
  - app-sealed-secrets.yaml
  - app-traefik.yaml
  - app-victoria-metrics.yaml
  - google-sso-secret.yaml
  - certificate.yaml
  - ingress-route.yaml
  - repo-homelab-manifest.yaml
  - repo-mt4jm.yaml
  - github-sha-plugin/
