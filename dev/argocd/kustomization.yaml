helmCharts:
  - repo: https://argoproj.github.io/argo-helm
    name: argo-cd
    version: "9.7.1"
    includeCRDs: true
    namespace: argocd
    releaseName: argocd
    valuesFile: values.yaml

resources:
  - applications/
  - google-sso-secret.yaml
  - certificate.yaml
  - ingress-route.yaml
  - repo-homelab-manifest.yaml
  - repo-mt4jm.yaml
  - repo-mfsm.yaml
  - github-sha-plugin/
  - notifications-secret.yaml
