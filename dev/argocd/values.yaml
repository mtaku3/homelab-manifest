global:
  domain: argocd.mtaku3.com

configs:
  params:
    server.insecure: true
    timeout.reconciliation: 600s
    controller.status.processors: 5
    controller.operation.processors: 3
    controller.self.heal.timeout.seconds: 300
    controller.kubectl.parallelism.limit: 5
    reposerver.parallelism.limit: 2

  cm:
    url: https://argocd.mtaku3.com
    dex.config: |
      connectors:
        - type: google
          id: google
          name: Google
          config:
            clientID: $google-sso-secret:client-id
            clientSecret: $google-sso-secret:client-secret
            hostedDomains:
              - mtaku3.com

  rbac:
    scopes: "[email]"
    policy.csv: |
      g, me@mtaku3.com, role:admin
    policy.default: role:readonly

  cmp:
    create: true
    plugins:
      homelab-manifest-build:
        discover:
          find:
            command: ["/bin/bash", "-c"]
            args:
              - |
                REPO_ROOT="${PWD%/$ARGOCD_APP_SOURCE_PATH}"
                if [ -f "$REPO_ROOT/scripts/build.sh" ]; then
                  echo "Found"
                fi
        generate:
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              REPO_ROOT="${PWD%/$ARGOCD_APP_SOURCE_PATH}"
              chmod +x "$REPO_ROOT/scripts/build.sh"
              NAMESPACE="${PARAM_NAMESPACE:-$ARGOCD_APP_NAMESPACE}"
              "$REPO_ROOT/scripts/build.sh" . "$NAMESPACE"

redis-ha:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1

server:
  replicas: 1

repoServer:
  replicas: 1

  extraContainers:
    - name: homelab-manifest-build-cmp
      image: mtaku3/argocd-toolset:latest
      imagePullPolicy: Always
      command: [/var/run/argocd/argocd-cmp-server]
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: homelab-manifest-build.yaml
          name: argocd-cmp-cm-vol
        - mountPath: /tmp
          name: cmp-tmp

  volumes:
    - name: argocd-cmp-cm-vol
      configMap:
        name: argocd-cmp-cm
    - name: cmp-tmp
      emptyDir: {}

applicationSet:
  replicas: 1

notifications:
  secret:
    create: false
  notifiers:
    service.webhook.discord-deployments: |
      url: $discord-deployments
      headers:
        - name: Content-Type
          value: application/json
    service.webhook.discord-cluster-events: |
      url: $discord-cluster-events
      headers:
        - name: Content-Type
          value: application/json
  templates:
    template.discord-sync-failed: |
      webhook:
        discord-deployments:
          method: POST
          body: |
            {"embeds":[{"title":{{ printf "❌ %s — sync failed" .app.metadata.name | quote }},"description":{{ .app.status.operationState.message | quote }},"color":15158332}]}
    template.discord-deployed: |
      webhook:
        discord-deployments:
          method: POST
          body: |
            {"embeds":[{"title":{{ printf "✅ %s — deployed" .app.metadata.name | quote }},"description":{{ printf "revision %s" .app.status.sync.revision | quote }},"color":3066993}]}
    template.discord-health-degraded: |
      webhook:
        discord-cluster-events:
          method: POST
          body: |
            {"embeds":[{"title":{{ printf "⚠️ %s — Degraded" .app.metadata.name | quote }},"description":{{ .app.status.health.message | quote }},"color":15105570}]}
    template.discord-sync-running: |
      webhook:
        discord-cluster-events:
          method: POST
          body: |
            {"embeds":[{"title":{{ printf "🔄 %s — sync running" .app.metadata.name | quote }},"color":3447003}]}
  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [discord-sync-failed]
    trigger.on-deployed: |
      - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
        send: [discord-deployed]
        oncePer: app.status.sync.revision
    trigger.on-health-degraded: |
      - when: app.status.health.status == 'Degraded'
        send: [discord-health-degraded]
    trigger.on-sync-running: |
      - when: app.status.operationState.phase in ['Running']
        send: [discord-sync-running]
  subscriptions:
    - recipients: [discord-deployments]
      triggers: [on-sync-failed, on-deployed]
    - recipients: [discord-cluster-events]
      triggers: [on-health-degraded, on-sync-running]
