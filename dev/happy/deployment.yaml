apiVersion: apps/v1
kind: Deployment
metadata:
  name: happy-server
  namespace: happy
  labels:
    app.kubernetes.io/name: happy-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: happy-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: happy-server
    spec:
      containers:
        - name: happy-server
          image: ghcr.io/mtaku3/happy-server:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: PUBLIC_URL
              value: https://happy.mtaku3.com
            - name: DB_PROVIDER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: happy-secret
                  key: POSTGRES_PASSWORD
            - name: HANDY_MASTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: happy-secret
                  key: HANDY_MASTER_SECRET
            - name: DATABASE_URL
              value: postgresql://happy:$(POSTGRES_PASSWORD)@happy-postgres.happy.svc.cluster.local:5432/happy
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
