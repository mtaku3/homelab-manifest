grafana:
  envValueFrom:
    GF_AUTH_GOOGLE_CLIENT_ID:
      secretKeyRef:
        name: google-sso-secret
        key: client-id
    GF_AUTH_GOOGLE_CLIENT_SECRET:
      secretKeyRef:
        name: google-sso-secret
        key: client-secret
  grafana.ini:
    server:
      root_url: https://grafana.mtaku3.com
    auth.google:
      enabled: true
      client_id: $__env{GF_AUTH_GOOGLE_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GOOGLE_CLIENT_SECRET}
      scopes: https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email
      auth_url: https://accounts.google.com/o/oauth2/auth
      token_url: https://accounts.google.com/o/oauth2/token
      allowed_domains: mtaku3.com
      allow_sign_up: true
  persistence:
    enabled: true
    type: statefulset
    size: 2Gi

defaultDashboard:
  defaultTimezone: Asia/Tokyo

vmsingle:
  spec:
    retentionPeriod: "14d"
    extraArgs:
      dedup.minScrapeInterval: "60s"

defaultRules:
  params:
    scrapeInterval: 60s

kubeApiServer:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: https
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            serverName: kubernetes.default.svc

# kubectl create secret generic etcd-certs -n victoria-metrics \
#   --from-file=ca.crt=/run/agenix/kubernetes/pki/etcd/ca.crt \
#   --from-file=client.crt=/run/agenix/kubernetes/pki/etcd/healthcheck-client.crt \
#   --from-file=client.key=/run/agenix/kubernetes/pki/etcd/healthcheck-client.key --dry-run=client -oyaml
# etcd/scheduler/controller-manager run as systemd services on the NixOS node,
# not pods. The chart wires them up via a manual Endpoints object, but ArgoCD's
# resource.exclusions excludes Endpoints (chart default), so that object is never
# managed and stays frozen at the node's install-time IP -> "No data". Disable the
# chart Service/Endpoints for these and scrape the node directly via VMStaticScrape
# (see control-plane-scrapes.yaml). service.enabled=false keeps the bundled
# VMRules + dashboards (only the Service+Endpoints are dropped).
kubeEtcd:
  service:
    enabled: false

coreDns:
  service:
    port: 55
    targetPort: 10055

kubeScheduler:
  service:
    enabled: false

kubeControllerManager:
  service:
    enabled: false

victoria-metrics-operator:
  enabled: false
  crds:
    cleanup:
      enabled: false
