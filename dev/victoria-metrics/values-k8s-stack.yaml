grafana:
  envValueFrom:
    GF_AUTH_GOOGLE_CLIENT_ID:
      secretKeyRef:
        name: google-sso-secret
        key: client-id
    GF_AUTH_GOOGLE_CLIENT_SECRET:
      secretKeyRef:
        name: google-sso-secret
        key: client-secret
  grafana.ini:
    server:
      root_url: https://grafana.mtaku3.com
    auth.google:
      enabled: true
      client_id: $__env{GF_AUTH_GOOGLE_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GOOGLE_CLIENT_SECRET}
      scopes: https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email
      auth_url: https://accounts.google.com/o/oauth2/auth
      token_url: https://accounts.google.com/o/oauth2/token
      allowed_domains: mtaku3.com
      allow_sign_up: true
  persistence:
    enabled: true
    type: statefulset
    size: 2Gi

defaultDashboard:
  defaultTimezone: Asia/Tokyo

vmsingle:
  spec:
    retentionPeriod: "14d"
    extraArgs:
      dedup.minScrapeInterval: "60s"

defaultRules:
  params:
    scrapeInterval: 60s

kubeApiServer:
  vmScrape:
    spec:
      endpoints:
        - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          port: https
          scheme: https
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            serverName: kubernetes.default.svc

# etcd-certs holds the client cert vmagent presents to etcd (mTLS). Regenerate
# from the node's live etcd PKI and re-seal when the node/PKI is rebuilt:
#   sudo kubectl create secret generic etcd-certs -n victoria-metrics \
#     --from-file=client.crt=/run/agenix/homelab-k8s/etcd/healthcheck-client.crt \
#     --from-file=client.key=/run/agenix/homelab-k8s/etcd/healthcheck-client.key \
#     --dry-run=client -o yaml \
#   | kubeseal --format yaml --controller-namespace sealed-secrets \
#       --controller-name sealed-secrets > secrets/etcd-certs.yaml
# etcd/scheduler/controller-manager run as systemd services on the NixOS node,
# not pods. The chart wires them up via a manual Endpoints object, but ArgoCD's
# resource.exclusions excludes Endpoints (chart default), so that object is never
# managed and stays frozen at the node's install-time IP -> "No data". Disable the
# chart Service/Endpoints for these and scrape the node directly via VMStaticScrape
# (see control-plane-scrapes.yaml). service.enabled=false drops the Service +
# Endpoints; the component stays enabled so the bundled VMRules + dashboards
# (gated on .enabled) are kept.
#
# Also drop the chart's leftover VMServiceScrape (vmScrape: null -> Helm removes
# the key). With no Service to select it would render an empty scrape_pool that
# fires ScrapePoolHasNoTargets (and previously hijacked core-dns via its empty
# selector). The component is already scraped via VMStaticScrape instead.
kubeEtcd:
  service:
    enabled: false
  vmScrape: null

coreDns:
  service:
    port: 55
    targetPort: 10055

kubeScheduler:
  service:
    enabled: false
  vmScrape: null

kubeControllerManager:
  service:
    enabled: false
  vmScrape: null

victoria-metrics-operator:
  enabled: false
  crds:
    cleanup:
      enabled: false

alertmanager:
  spec:
    secrets:
      - discord-webhook
  config:
    route:
      receiver: blackhole
      group_by: ['...']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: ['alertname=~"Watchdog|InfoInhibitor"']
          receiver: blackhole
        - matchers: ['severity="critical"']
          receiver: discord-critical
        - matchers: ['severity="warning"']
          receiver: discord-warning
    receivers:
      - name: blackhole
      - name: discord-critical
        discord_configs:
          - webhook_url_file: /etc/vm/secrets/discord-webhook/webhook-critical
            send_resolved: true
            title: &discord_title |-
              {{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }}: {{ .CommonLabels.alertname }}
            message: &discord_message |-
              {{ range .Alerts -}}
              {{- if .Annotations.summary }}**{{ .Annotations.summary }}**
              {{ end -}}
              {{ if .Annotations.description }}{{ .Annotations.description }}

              {{ end -}}
              **Severity:** `{{ .Labels.severity }}`
              {{- with .Labels.namespace }}
              **Namespace:** `{{ . }}`
              {{- end }}
              {{- with .Labels.pod }}
              **Pod:** `{{ . }}`
              {{- end }}
              {{- with .Labels.instance }}
              **Instance:** `{{ . }}`
              {{- end }}

              [🏠 Grafana Home](https://grafana.mtaku3.com){{ if .Labels.pod }} · [📊 Pod Metrics](https://grafana.mtaku3.com/d/k8s_views_pods/kubernetes-views-pods?var-namespace={{ .Labels.namespace | urlquery }}&var-pod={{ .Labels.pod | urlquery }}&from=now-1h&to=now){{ end }}
              {{ end -}}
      - name: discord-warning
        discord_configs:
          - webhook_url_file: /etc/vm/secrets/discord-webhook/webhook-warning
            send_resolved: true
            title: *discord_title
            message: *discord_message
