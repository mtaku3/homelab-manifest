apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: victoria-metrics
  annotations:
    external-dns.alpha.kubernetes.io/target: 202.215.58.76
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.mtaku3.com`)
      kind: Rule
      services:
        - name: vm-grafana
          port: service
  tls:
    secretName: grafana-tls-cert
