apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
  namespace: mt4jm
  annotations:
    external-dns.alpha.kubernetes.io/target: 202.215.58.76
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mt4jm.mtaku3.com`)
      kind: Rule
      services:
        - name: mt4jm-web
          port: http
  tls:
    secretName: web-tls-cert
