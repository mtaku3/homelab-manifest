apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-loxilb
  namespace: kube-system
spec:
  template:
    spec:
      containers:
        - name: kube-loxilb
          image: mtaku3/kube-loxilb:v0.9.8.4
          args:
            - --cidrPools=defaultPool=192.168.10.100/32
            - --setBGP=64512
            - --listenBGPPort=1791
            - --setRoles=0.0.0.0
            # - --setLBMode=1
            # - --loxiURL=http://192.168.80.10:11111
            #- --monitor
            #- --extBGPPeers=50.50.50.1:65101,51.51.51.1:65102
            #- --config=/opt/loxilb/agent/kube-loxilb.conf
