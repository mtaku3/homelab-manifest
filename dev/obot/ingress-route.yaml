apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
  namespace: obot
  annotations:
    external-dns.alpha.kubernetes.io/target: 202.215.58.76
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`obot.mtaku3.com`)
      kind: Rule
      services:
        - name: obot-obot
          port: 80
  tls:
    secretName: web-tls-cert
