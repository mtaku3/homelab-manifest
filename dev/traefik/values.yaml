ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true

providers:
  kubernetesCRD:
    allowCrossNamespace: true
    allowExternalNameServices: true

logs:
  general:
    format: json

service:
  type: LoadBalancer
  loadBalancerClass: loxilb.io/loxilb
