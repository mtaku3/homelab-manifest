---
# Source: openebs/charts/zfs-localpv/templates/configmap.yaml
kind: ConfigMap
apiVersion: v1
metadata:
  name: openebs-zfspv-bin
  namespace: default # should be the same namespace where it is getting mounted
  labels:
    chart: zfs-localpv-2.8.0
    heritage: Helm
    openebs.io/version: "2.8.0"
    role: "openebs-zfs"
    name: "openebs-zfs-node"
    release: openebs
    app: "openebs-zfs-node"
    openebs.io/component-name: "openebs-zfs-node"
data:
  zfs: |
    #!/bin/sh
    if [ -x /host/sbin/zfs ]; then
      chroot /host /sbin/zfs "$@"
    elif [ -x /host/usr/sbin/zfs ]; then
      chroot /host /usr/sbin/zfs "$@"
    else
      chroot /host "/run/current-system/sw/bin/zfs" "$@"
    fi
